<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chef Casa">
<meta name="theme-color" content="#F0913A">
<title>Chef en Casa 🍳</title>
<link rel="manifest" href="manifest.json">
<!-- Inline SVG icons as apple-touch-icon fallback -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23F0913A' rx='20'/><text y='.9em' font-size='75' x='12'>🍳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0D0A;--surface:#1A1712;--surface2:#242018;--border:#2E2820;
  --orange:#F0913A;--orange2:#E07020;--gold:#D4A849;--green:#5A9E6F;
  --green2:#3D7A52;--red:#D95F4B;--blue:#4A8FBF;--purple:#8B6FBF;
  --text:#F2EDE4;--text2:#9A8F7E;--text3:#5A5248;
  --shadow:rgba(0,0,0,0.4);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.app-header{background:linear-gradient(135deg,var(--surface) 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:1rem 1.25rem 0;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;}
.app-title{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;letter-spacing:-0.5px;}
.app-title span{color:var(--orange);}
.header-pills{display:flex;gap:0.4rem;align-items:center;}
.h-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:0.2rem 0.6rem;font-size:0.62rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.2s;}
.h-pill.online{color:var(--green);border-color:rgba(90,158,111,0.3);}
.h-pill.offline{color:var(--red);border-color:rgba(217,95,75,0.3);}

/* NAV */
nav{display:flex;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border);}
nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:1;min-width:52px;padding:0.6rem 0.25rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'Cabinet Grotesk',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:0.12rem;}
.nav-btn .ni{font-size:0.95rem;}
.nav-btn.active{color:var(--orange);border-bottom-color:var(--orange);}

/* VIEWS */
.view{display:none;padding:1rem 1.1rem calc(5rem + var(--safe-bottom));max-width:680px;margin:0 auto;}
.view.active{display:block;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS & SECTIONS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.sec{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* TAGS */
.tag{display:inline-block;font-size:0.6rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:20px;letter-spacing:0.4px;}
.tag.time{background:rgba(212,168,73,0.15);color:var(--gold);}
.tag.cat{background:rgba(74,143,191,0.15);color:var(--blue);}
.tag.kcal{background:rgba(90,158,111,0.15);color:var(--green);}
.tag.kids{background:rgba(240,145,58,0.15);color:var(--orange);}
.tag.veg{background:rgba(90,158,111,0.2);color:var(--green);}
.tag.actifry{background:rgba(217,95,75,0.15);color:var(--red);}
.tag.fav{background:rgba(212,168,73,0.2);color:var(--gold);}
.tag.cooked{background:rgba(90,158,111,0.2);color:var(--green);}

/* ══ HOY ══ */
.today-hero{background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.today-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 85% 15%,rgba(240,145,58,0.2) 0%,transparent 55%);pointer-events:none;}
.today-hero h2{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:900;line-height:1.1;position:relative;}
.today-hero .sub{font-size:0.8rem;color:var(--text2);margin-top:0.35rem;position:relative;}
.today-big-emoji{font-size:3.5rem;position:absolute;right:1.1rem;top:50%;transform:translateY(-50%);opacity:0.65;}

.today-actions{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem;}
.action-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:0.9rem;cursor:pointer;transition:all 0.2s;text-align:left;display:flex;flex-direction:column;gap:0.25rem;}
.action-btn:hover,.action-btn:active{border-color:var(--orange);background:var(--surface2);}
.action-btn .ab-icon{font-size:1.4rem;}
.action-btn .ab-title{font-size:0.8rem;font-weight:700;color:var(--text);}
.action-btn .ab-sub{font-size:0.68rem;color:var(--text2);}
.action-btn.primary{background:var(--orange);border-color:var(--orange);}
.action-btn.primary .ab-title,.action-btn.primary .ab-sub{color:var(--bg);}

.today-recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.cook-now-btn{display:block;width:100%;padding:0.75rem;background:var(--orange);color:var(--bg);border:none;border-radius:10px;font-family:'Cabinet Grotesk',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
.cook-now-btn:hover{background:var(--orange2);}

/* ══ MENÚ ══ */
.ai-banner{background:linear-gradient(135deg,#1a1f2e,#0f1520);border:1px solid rgba(74,143,191,0.3);border-radius:16px;padding:1rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.85rem;}
.ai-icon{font-size:1.8rem;flex-shrink:0;}
.ai-banner h3{font-size:0.85rem;font-weight:700;color:#7DB8E8;}
.ai-banner p{font-size:0.7rem;color:var(--text2);margin-top:0.1rem;}
.ai-gen-btn{flex-shrink:0;background:var(--blue);color:white;border:none;border-radius:10px;padding:0.5rem 0.85rem;font-family:'Cabinet Grotesk',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.ai-gen-btn:disabled{opacity:0.5;cursor:not-allowed;}
.ai-loading{display:none;background:var(--surface);border:1px solid rgba(74,143,191,0.3);border-radius:14px;padding:1rem;text-align:center;margin-bottom:0.75rem;}
.ai-loading.show{display:block;}
.ai-spinner{font-size:1.8rem;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.week-list{display:flex;flex-direction:column;gap:0.55rem;}
.day-row{background:var(--surface);border:1px solid var(--border);border-radius:13px;display:flex;align-items:center;gap:0.65rem;padding:0.75rem;transition:border-color 0.2s;}
.day-pill{background:var(--surface2);border-radius:8px;padding:0.35rem 0.45rem;text-align:center;flex-shrink:0;min-width:38px;}
.day-pill .dpl{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:900;color:var(--orange);display:block;}
.day-pill .dpd{font-size:0.52rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;}
.day-emoji{width:44px;height:44px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden;position:relative;}
.day-emoji img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.day-info{flex:1;min-width:0;}
.day-info h3{font-size:0.82rem;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-info .di-meta{font-size:0.67rem;color:var(--text2);margin-top:0.1rem;display:flex;gap:0.5rem;align-items:center;}
.day-btns{display:flex;gap:0.3rem;flex-shrink:0;}
.btn-sm{padding:0.28rem 0.55rem;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Cabinet Grotesk',sans-serif;font-size:0.62rem;font-weight:700;cursor:pointer;transition:all 0.18s;}
.btn-sm:hover{border-color:var(--orange);color:var(--orange);}
.btn-sm.cook{background:var(--orange);border-color:var(--orange);color:var(--bg);}

/* ══ BIBLIOTECA ══ */
.filter-scroll{display:flex;gap:0.4rem;overflow-x:auto;scrollbar-width:none;padding-bottom:0.5rem;margin-bottom:0.85rem;}
.filter-scroll::-webkit-scrollbar{display:none;}
.filt-btn{flex-shrink:0;padding:0.38rem 0.8rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;color:var(--text2);transition:all 0.18s;}
.filt-btn.active{background:var(--orange);border-color:var(--orange);color:var(--bg);}

.lib-grid{display:flex;flex-direction:column;gap:0.5rem;}
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;display:flex;align-items:center;gap:0.7rem;padding:0.7rem;cursor:pointer;transition:all 0.18s;}
.lib-card:hover,.lib-card:active{border-color:var(--orange);}
.lib-thumb{width:52px;height:52px;border-radius:9px;overflow:hidden;flex-shrink:0;position:relative;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.7rem;}
.lib-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.lib-info{flex:1;min-width:0;}
.lib-info h3{font-size:0.85rem;font-weight:700;line-height:1.2;}
.lib-info p{font-size:0.7rem;color:var(--text2);margin-top:0.08rem;}
.lib-tags{display:flex;gap:0.28rem;flex-wrap:wrap;margin-top:0.3rem;}
.lib-fav-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;flex-shrink:0;padding:0.2rem;transition:transform 0.2s;}
.lib-fav-btn:active{transform:scale(1.4);}

/* ══ RECETA DETALLE ══ */
.recipe-hero{position:relative;height:200px;border-radius:16px;overflow:hidden;margin-bottom:1rem;background:var(--surface2);}
.recipe-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.recipe-hero-emoji-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5.5rem;}
.recipe-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,5,0.96) 0%,rgba(10,8,5,0.3) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.1rem;}
.recipe-hero-overlay h2{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:900;line-height:1.15;color:white;}
.recipe-hero-meta{display:flex;gap:0.45rem;flex-wrap:wrap;margin-top:0.35rem;}

.back-pill{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:0.35rem 0.8rem;font-size:0.72rem;font-weight:700;color:white;cursor:pointer;margin-bottom:0.7rem;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.18s;}

.nutr-bar{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:0.9rem;margin-bottom:0.8rem;}
.nutr-bar h4{font-size:0.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.6rem;}
.nutr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;}
.nutr-item{text-align:center;}
.nutr-val{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:var(--orange);}
.nutr-label{font-size:0.58rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-top:0.08rem;}

/* History stars */
.rating-row{display:flex;gap:0.3rem;align-items:center;margin-top:0.5rem;}
.star-btn{font-size:1.3rem;cursor:pointer;transition:transform 0.15s;background:none;border:none;}
.star-btn:active{transform:scale(1.3);}
.cooked-count{font-size:0.7rem;color:var(--text3);font-weight:600;}

.assign-row{display:flex;gap:0.5rem;margin-bottom:0.8rem;}
.assign-btn-full{flex:1;background:var(--orange);color:var(--bg);border:none;border-radius:10px;padding:0.65rem;font-family:'Cabinet Grotesk',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
.assign-btn-full:hover{background:var(--orange2);}
.cook-guided-btn{flex:1;background:var(--surface2);border:1px solid var(--green);color:var(--green);border-radius:10px;padding:0.65rem;font-family:'Cabinet Grotesk',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}

.ing-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin-bottom:0.8rem;}
.ing-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:0.48rem 0.68rem;display:flex;align-items:center;gap:0.38rem;font-size:0.76rem;}
.ing-qty{font-weight:800;color:var(--orange);min-width:38px;font-size:0.7rem;}

.steps-list{display:flex;flex-direction:column;gap:0.48rem;margin-bottom:0.8rem;}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:0.8rem;display:flex;gap:0.7rem;align-items:flex-start;}
.step-num-badge{background:var(--orange);color:var(--bg);font-weight:900;font-size:0.72rem;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Fraunces',serif;}
.step-body{flex:1;}
.step-title{font-size:0.78rem;font-weight:700;color:var(--orange);margin-bottom:0.18rem;}
.step-text{font-size:0.78rem;line-height:1.55;color:var(--text2);}
.step-text strong{color:var(--text);}
.step-timer-badge{margin-top:0.4rem;font-size:0.68rem;color:var(--gold);font-weight:700;}

.tip-card{background:linear-gradient(135deg,rgba(212,168,73,0.08),rgba(212,168,73,0.03));border:1px solid rgba(212,168,73,0.2);border-radius:11px;padding:0.85rem;margin-bottom:0.8rem;}
.tip-head{font-size:0.72rem;font-weight:700;color:var(--gold);margin-bottom:0.28rem;}
.tip-body{font-size:0.76rem;line-height:1.55;color:var(--text2);}

/* ══ COCINA GUIADA ══ */
.guided-header{background:linear-gradient(135deg,#0d1f0f,#0a1a0c);border:1px solid rgba(90,158,111,0.3);border-radius:16px;padding:1.2rem;margin-bottom:1rem;}
.guided-header h2{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:900;}
.guided-header .gh-sub{font-size:0.76rem;color:var(--text2);margin-top:0.2rem;}
.prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0.8rem;margin-bottom:0.8rem;}
.prog-label{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text2);font-weight:600;margin-bottom:0.4rem;}
.prog-bar-bg{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden;}
.prog-bar-fill{background:var(--green);height:100%;border-radius:20px;transition:width 0.4s ease;}

.guided-step{background:var(--surface);border:1px solid rgba(90,158,111,0.25);border-radius:16px;padding:1.2rem;margin-bottom:0.8rem;}
.gs-num{font-size:0.68rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.3rem;}
.gs-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:0.45rem;}
.gs-text{font-size:0.83rem;line-height:1.6;color:var(--text2);}
.gs-text strong{color:var(--text);}

.timer-block{background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:1rem;text-align:center;margin-top:0.8rem;}
.timer-display{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:900;color:var(--orange);line-height:1;letter-spacing:-1px;}
.timer-display.warning{color:var(--red);}
.timer-display.done{color:var(--green);}
.timer-label{font-size:0.68rem;color:var(--text2);margin-top:0.22rem;font-weight:600;}
.timer-btns{display:flex;gap:0.45rem;justify-content:center;margin-top:0.65rem;}
.timer-btn{padding:0.45rem 1rem;border-radius:8px;border:none;font-family:'Cabinet Grotesk',sans-serif;font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.timer-btn.start{background:var(--orange);color:var(--bg);}
.timer-btn.reset{background:var(--surface);border:1px solid var(--border);color:var(--text2);}

.guided-nav{display:flex;gap:0.55rem;margin-bottom:0.8rem;}
.gnav-btn{flex:1;padding:0.72rem;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Cabinet Grotesk',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.gnav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.gnav-btn.next{background:var(--green);border-color:var(--green);color:white;}
.gnav-btn.finish{background:var(--gold);border-color:var(--gold);color:var(--bg);}

.guided-ingredients{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:0.9rem;margin-bottom:0.8rem;}
.guided-ingredients h4{font-size:0.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.55rem;}

/* ══ HISTORIAL / FAVORITOS ══ */
.hist-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:1rem;}
.hist-stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:0.85rem;text-align:center;}
.hist-stat .hs-val{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:var(--orange);}
.hist-stat .hs-label{font-size:0.62rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:0.1rem;}

.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:0.75rem;display:flex;align-items:center;gap:0.65rem;margin-bottom:0.45rem;}
.hist-emoji{font-size:1.6rem;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-info h3{font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-info p{font-size:0.68rem;color:var(--text2);margin-top:0.08rem;}
.hist-stars{font-size:0.75rem;flex-shrink:0;}

/* ══ NUTRICIÓN ══ */
.nutr-week{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;}
.nutr-row{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:0.75rem;display:flex;align-items:center;gap:0.65rem;}
.nutr-day{font-size:0.68rem;font-weight:700;color:var(--text3);min-width:26px;text-align:center;}
.nutr-name{flex:1;font-size:0.78rem;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nutr-bar-mini{width:60px;flex-shrink:0;}
.nutr-kcal{font-family:'Fraunces',serif;font-size:0.95rem;font-weight:700;min-width:36px;text-align:right;flex-shrink:0;}
.nutr-summary{background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:13px;padding:1rem;display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem;text-align:center;margin-bottom:1rem;}
.ns-val{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:900;color:var(--gold);}
.ns-label{font-size:0.62rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:0.08rem;}

/* ══ COMPRA ══ */
.shop-header{background:linear-gradient(135deg,#0d1a10,#0a150c);border:1px solid rgba(90,158,111,0.25);border-radius:16px;padding:1.1rem;margin-bottom:1rem;}
.shop-header h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;}
.shop-header p{font-size:0.74rem;color:var(--text2);margin-top:0.18rem;}
.shop-stats{display:flex;gap:0.65rem;margin-top:0.55rem;flex-wrap:wrap;}
.shop-stat{font-size:0.7rem;font-weight:700;color:var(--green);}

.shop-actions{display:flex;gap:0.45rem;margin-bottom:0.85rem;flex-wrap:wrap;}
.shop-act-btn{padding:0.55rem 0.85rem;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Cabinet Grotesk',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.shop-act-btn:hover{border-color:var(--orange);color:var(--orange);}
.shop-act-btn.mercadona{background:rgba(0,99,65,0.15);border-color:rgba(0,99,65,0.4);color:#00c870;}
.shop-act-btn.mercadona:hover{background:rgba(0,99,65,0.25);}
.shop-act-btn.danger{border-color:rgba(217,95,75,0.4);color:var(--red);}

.shop-section{margin-bottom:1.1rem;}
.shop-sec-head{font-size:0.62rem;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);padding:0.38rem 0;border-bottom:1px solid var(--border);margin-bottom:0.45rem;display:flex;align-items:center;justify-content:space-between;}
.shop-sec-mercadona{font-size:0.58rem;background:rgba(0,99,65,0.15);color:#00c870;border:1px solid rgba(0,99,65,0.3);border-radius:20px;padding:0.1rem 0.45rem;cursor:pointer;font-weight:700;font-family:'Cabinet Grotesk',sans-serif;}
.shop-items{display:flex;flex-direction:column;gap:0.32rem;}
.shop-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:0.5rem 0.8rem;display:flex;align-items:center;gap:0.55rem;cursor:pointer;transition:all 0.18s;}
.shop-item.checked{opacity:0.35;}
.shop-chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;font-size:0.58rem;color:transparent;}
.shop-item.checked .shop-chk{background:var(--green);border-color:var(--green);color:white;}
.shop-item-name{flex:1;font-size:0.78rem;}
.shop-item.checked .shop-item-name{text-decoration:line-through;}
.shop-item-right{text-align:right;flex-shrink:0;}
.shop-item-qty{font-size:0.68rem;color:var(--text3);font-weight:700;}
.shop-item-days{font-size:0.58rem;color:var(--text3);}
.shop-merc-btn{background:none;border:none;font-size:0.75rem;cursor:pointer;padding:0.15rem;opacity:0.6;transition:opacity 0.18s;}
.shop-merc-btn:hover{opacity:1;}

/* ══ MODALS ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,5,0.82);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem 1.2rem calc(2rem + var(--safe-bottom));width:100%;max-width:480px;animation:slideUp 0.28s ease;max-height:82vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:1rem;}
.modal-day-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;}
.modal-day-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.7rem;cursor:pointer;transition:all 0.18s;text-align:left;}
.modal-day-btn:hover{border-color:var(--orange);}
.mdb-name{font-size:0.8rem;font-weight:700;color:var(--text);display:block;}
.mdb-cur{font-size:0.62rem;color:var(--text3);display:block;margin-top:0.12rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-cancel{margin-top:0.8rem;width:100%;padding:0.62rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);font-family:'Cabinet Grotesk',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;}

/* PWA Install Banner */
.install-banner{background:linear-gradient(135deg,#1a1520,#110e18);border:1px solid rgba(139,111,191,0.3);border-radius:14px;padding:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.85rem;}
.install-banner .ib-icon{font-size:1.8rem;flex-shrink:0;}
.install-banner h3{font-size:0.82rem;font-weight:700;color:#C4A9F0;}
.install-banner p{font-size:0.68rem;color:var(--text2);margin-top:0.1rem;}
.install-btn{flex-shrink:0;background:var(--purple);color:white;border:none;border-radius:9px;padding:0.48rem 0.85rem;font-family:'Cabinet Grotesk',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.install-dismiss{background:none;border:none;color:var(--text3);font-size:1rem;cursor:pointer;flex-shrink:0;}

/* TOAST */
.toast{position:fixed;bottom:calc(5rem + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:0.55rem 1.1rem;font-size:0.78rem;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 8px 24px var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Offline indicator */
.offline-bar{display:none;position:fixed;top:0;left:0;right:0;background:var(--red);color:white;text-align:center;font-size:0.72rem;font-weight:700;padding:0.35rem;z-index:200;}
.offline-bar.show{display:block;}
</style>
</head>

function getSection(name){
  const lower=name.toLowerCase();
  for(const [sec,keys] of Object.entries(MERC_SECTIONS)){
    if(keys.some(k=>lower.includes(k))) return sec;
  }
  return "🛒 Otros";
}

function loadStorage(key,def){
  try{ const v=localStorage.getItem(key); return v?JSON.parse(v):def; }
  catch{ return def; }
}
function saveStorage(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} }

function saveHistory(){ saveStorage('chef_history',cookedHistory); }
function saveMenu(){ saveStorage('chef_menu',weekMenu); }
function saveShop(){ saveStorage('chef_shop',[...checkedShop]); }

function toggleFavorite(id){
  if(favorites.includes(id)) favorites=favorites.filter(f=>f!==id);
  else favorites.push(id);
  saveFavorites();
}
function isFav(id){ return favorites.includes(id); }

function markCooked(id, rating=0){
  cookedHistory.unshift({id, date:new Date().toISOString().split('T')[0], rating});
  if(cookedHistory.length>100) cookedHistory=cookedHistory.slice(0,100);
  saveHistory();
}
function getCookedCount(id){ return cookedHistory.filter(h=>h.id===id).length; }
function getLastRating(id){
  const h=cookedHistory.find(h=>h.id===id); return h?h.rating:0;
}
function setRating(id,rating){
  const h=cookedHistory.find(h=>h.id===id);
  if(h) h.rating=rating; else cookedHistory.unshift({id,date:new Date().toISOString().split('T')[0],rating});
  saveHistory();
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const order=['hoy','menu','biblioteca','cocinar','historial','nutricion','compra'];
  const navOrder=['hoy','menu','biblioteca','cocinar',null,'nutricion','compra'];
  const ni=navOrder.indexOf(name);
  if(ni>=0&&ni<6) document.querySelectorAll('.nav-btn')[ni>=4?ni-1:ni]&&
    document.querySelectorAll('.nav-btn')[ni>=4?ni:ni].classList.add('active');
  const navMap={hoy:0,menu:1,biblioteca:2,cocinar:3,nutricion:4,compra:5};
  if(navMap[name]!==undefined) document.querySelectorAll('.nav-btn')[navMap[name]].classList.add('active');
  if(name==='hoy') renderHoy();
  if(name==='menu') renderMenu();
  if(name==='biblioteca') renderBiblioteca();
  if(name==='nutricion') renderNutricion();
  if(name==='compra') renderCompra();
  if(name==='historial') renderHistorial();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function imgThumb(url,emoji,cls='',style=''){

// AI MENU
async function generateAIMenu(){
  const btn=document.getElementById('ai-btn');
  const loading=document.getElementById('ai-loading');
  btn.disabled=true; btn.textContent='⏳';
  loading.classList.add('show');

  // Build history context
  const favIds=favorites.slice(0,10);
  const recentIds=[...new Set(cookedHistory.slice(0,20).map(h=>h.id))];
  const topRated=cookedHistory.filter(h=>h.rating>=4).map(h=>h.id).slice(0,10);
  const recipeList=getAllRecipes().map(r=>`${r.id}:${r.name}(${r.cat}${r.tags.includes('kids')?',kids':''}${r.tags.includes('veg')?',veg':''})`).join('\n');

  const prompt=`Eres un chef y nutricionista. Genera un menú semanal de cenas para una familia española: mujer 49 años, hombre 53 años, niña 11 años. Sin alergias.

Biblioteca de recetas disponibles:
${recipeList}

Datos de la familia:
- Favoritas (IDs): ${favIds.join(',')||'ninguna aún'}
- Últimas cocinadas (IDs): ${recentIds.join(',')||'ninguna aún'}
- Mejor valoradas 4-5 estrellas (IDs): ${topRated.join(',')||'ninguna aún'}
- IDs a evitar esta semana (ya cocinadas recientemente): ${recentIds.slice(0,5).join(',')||'ninguno'}

Reglas:
- Selecciona exactamente 7 recetas distintas (una por día: Lunes a Domingo)
- NO repitas recetas de la lista "ya cocinadas recientemente" si puedes evitarlo
- SÍ prioriza las favoritas y mejor valoradas cuando encajen
- Varía categorías: no más de 2 del mismo tipo
- Al menos: 1 pescado, 1 vegetariana, 1 pasta/arroz, 1 que le guste a una niña de 11 años
- Viernes/Sábado: algo especial (pizza, hamburguesa, tacos, crêpes...)
- Equilibra kcal a lo largo de la semana

Responde SOLO con JSON sin texto adicional ni backticks:
{"menu":[id1,id2,id3,id4,id5,id6,id7]}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.menu?.length===7&&parsed.menu.every(id=>RECIPES.find(r=>r.id===id))){
      weekMenu=parsed.menu; saveMenu();
      renderMenu(); renderCompra();
      toast('🧠 Menú generado con IA según tu historial');
    } else throw new Error('bad');
  } catch{
    // Smart fallback with history awareness
    const avoidIds=new Set(cookedHistory.slice(0,5).map(h=>h.id));
    const cats=['Pescado','Vegetariano','Pasta','Carne','Horneado','Carne','Arroz'];
    weekMenu=cats.map((cat,i)=>{
      let pool=RECIPES.filter(r=>r.cat===cat&&!avoidIds.has(r.id));
      if(!pool.length) pool=RECIPES.filter(r=>r.cat===cat);
      if(!pool.length) pool=RECIPES;
      // Prefer favorites
      const favPool=pool.filter(r=>favorites.includes(r.id));
      const source=favPool.length?favPool:pool;
      return source[Math.floor(Math.random()*source.length)].id;
    });
    saveMenu(); renderMenu(); renderCompra();
    toast('🎲 Menú generado con tus preferencias');
  }
  btn.disabled=false; btn.textContent='✨ Generar';
  loading.classList.remove('show');
}

function startGuided(id){

function renderGuided(){

function nextStep(){ stopTimer(); if(guidedStep<R(guidedRecipeId).steps.length-1){ guidedStep++; renderGuided(); window.scrollTo({top:0,behavior:'smooth'}); } }

function finishCooking(){

  saveHistory();

// TIMER
function toggleTimer(secs){ if(timerRunning) stopTimer(); else startTimer(secs); }
function startTimer(total){
  if(timerSecs<=0) timerSecs=total;
  timerRunning=true;
  const btn=document.getElementById('tb');
  if(btn) btn.textContent='⏸ Pausar';
  timerInterval=setInterval(()=>{
    timerSecs--;
    const d=document.getElementById('td');
    const b=document.getElementById('tb');
    if(!d){ clearInterval(timerInterval); return; }
    d.textContent=formatTime(timerSecs);
    if(timerSecs<=10) d.className='timer-display warning';
    if(timerSecs<=0){
      d.textContent='¡Listo!'; d.className='timer-display done';
      if(b) b.textContent='▶ Reiniciar';
      clearInterval(timerInterval); timerRunning=false;
      if(navigator.vibrate) navigator.vibrate([300,100,300,100,300]);
      toast('⏰ ¡Tiempo completado!');
    }
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); timerRunning=false; timerSecs=0; }
function resetTimer(secs){
  stopTimer(); timerSecs=secs;
  const d=document.getElementById('td'); const b=document.getElementById('tb');
  if(d){ d.textContent=formatTime(secs); d.className='timer-display'; }
  if(b) b.textContent='▶ Iniciar';
}

function buildShoppingData(){
  const sections={};
  weekMenu.forEach((rid,di)=>{
    const r=R(rid);
    r.ingredients.forEach(ing=>{
      const sec=getSection(ing.n);
      if(!sections[sec]) sections[sec]={};
      const key=ing.n.toLowerCase().trim();
      if(!sections[sec][key]) sections[sec][key]={name:ing.n,qty:ing.qty,days:[]};
      sections[sec][key].days.push(DNUMS[di]);
    });
  });
  return sections;
}

function renderCompra(){
  const sections=buildShoppingData();

  // Inject extra manual items into sections
  extraShopItems.forEach(item=>{
    const sec=item.sec||'🛒 Extras';
    if(!sections[sec]) sections[sec]={};
    sections[sec]['__extra__'+item.id]={name:item.name,qty:item.qty||'',days:['➕'],isExtra:true,extraId:item.id};
  });

  let totalItems=0;
  Object.values(sections).forEach(sec=>totalItems+=Object.keys(sec).length);
  const checked=checkedShop.size;

  const el=document.getElementById('view-compra');
  el.innerHTML=`

      <h2>🛒 Lista Mercadona</h2>

      <div style="display:flex;gap:0.5rem;">

      </div>

    ${Object.entries(sections)

function addExtraProduct(){
  const nameEl=document.getElementById('extra-product-name');
  const qtyEl=document.getElementById('extra-product-qty');
  const name=nameEl.value.trim();
  if(!name){ nameEl.focus(); return; }
  const item={id:Date.now(),name,qty:qtyEl.value.trim(),sec:'🛒 Extras'};
  extraShopItems.push(item);
  saveExtraShop();
  nameEl.value=''; qtyEl.value='';
  nameEl.focus();
  renderCompra();
  toast(`➕ "${name}" añadido a la lista`);
}

function deleteExtraItem(id){
  extraShopItems=extraShopItems.filter(i=>i.id!==id);
  saveExtraShop();
  renderCompra();
}

function searchMercadona(encodedName){
  const name=decodeURIComponent(encodedName);
  const url=`https://tienda.mercadona.es/search-results?query=${encodeURIComponent(name)}`;
  window.open(url,'_blank');
}

function openMercadonaAll(){
  window.open('https://tienda.mercadona.es','_blank');
  toast('🟢 Abriendo Mercadona online...');
}

function openMercadonaSection(encodedSec, itemsJson){
  const items=JSON.parse(decodeURIComponent(itemsJson)||'[]');
  if(items.length>0) searchMercadona(encodeURIComponent(items[0]));
}

function toggleShop(id,el){
  if(checkedShop.has(id)){ checkedShop.delete(id); el.classList.remove('checked'); el.querySelector('.shop-chk').textContent=''; }
  else{ checkedShop.add(id); el.classList.add('checked'); el.querySelector('.shop-chk').textContent='✓'; }
  saveShop();
  // Update counter
  const sections=buildShoppingData();
  let total=0; Object.values(sections).forEach(s=>total+=Object.keys(s).length);
  const stat=document.querySelector('.shop-stat');
  if(stat) stat.textContent=`✅ ${checkedShop.size}/${total} comprado`;
}

function checkAllItems(){
  document.querySelectorAll('.shop-item').forEach(el=>{
    const fn=el.getAttribute('onclick');
    const m=fn?.match(/toggleShop\('([^']+)'/);
    if(m&&!checkedShop.has(m[1])){ checkedShop.add(m[1]); el.classList.add('checked'); el.querySelector('.shop-chk').textContent='✓'; }
  });
  saveShop();
  const sections=buildShoppingData();
  let total=0; Object.values(sections).forEach(s=>total+=Object.keys(s).length);
  const stat=document.querySelector('.shop-stat');
  if(stat) stat.textContent=`✅ ${checkedShop.size}/${total} comprado`;
}

function uncheckAll(){ checkedShop.clear(); saveShop(); renderCompra(); }

// ══════════════════════════════════════════════════════════
function openAIRecipeCreator(){
  const modal=document.getElementById('modal-create-recipe');
  document.getElementById('recipe-name-input').value='';
  document.getElementById('create-recipe-result').innerHTML='';
  document.getElementById('create-recipe-save-btn').style.display='none';

}
function closeCreateModal(e){
  if(!e||e.target===document.getElementById('modal-create-recipe'))
    document.getElementById('modal-create-recipe').classList.remove('open');
}

let pendingNewRecipe=null;

async function generateRecipeWithAI(){
  const name=document.getElementById('recipe-name-input').value.trim();
  if(!name){ toast('✏️ Escribe el nombre del plato'); return; }

  const btn=document.getElementById('create-recipe-btn');
  const result=document.getElementById('create-recipe-result');
  const saveBtn=document.getElementById('create-recipe-save-btn');
  btn.disabled=true; btn.textContent='⏳ Generando...';
  result.innerHTML=`<div style="text-align:center;padding:1rem;color:var(--text2);font-size:0.8rem;"><div style="font-size:1.8rem;animation:spin 1s linear infinite;display:inline-block;">🤖</div><br>Claude está creando la receta...</div>`;
  saveBtn.style.display='none';

  const prompt=`Eres un chef experto. Crea una receta completa para: "${name}"

La receta es para una familia española de 3 personas (2 adultos + niña de 11 años). Debe ser una cena rápida (máximo 30 min).

Responde SOLO con un JSON válido, sin texto adicional ni backticks markdown:
{
  "name": "nombre exacto del plato",
  "desc": "descripción breve y apetecible (máx 60 caracteres)",
  "emoji": "un emoji representativo",
  "time": "XX min",
  "kcal": número_entero_por_persona,
  "prot": gramos_proteína_por_persona,
  "carbs": gramos_carbohidratos_por_persona,
  "fat": gramos_grasa_por_persona,
  "cat": "una de estas: Pasta|Arroz|Pescado|Carne|Vegetariano|Horneado|Postre|Sopa",
  "tags": ["kids"] o ["veg"] o ["world"] o [] según corresponda,
  "ingredients": [
    {"qty": "cantidad", "n": "nombre del ingrediente"},
    ... (6-8 ingredientes)
  ],
  "steps": [
    {"t": "título corto del paso", "s": "instrucción detallada con <strong>tiempos</strong> en negrita", "timer": segundos_o_null},
    ... (3-5 pasos)
  ],
  "tip": "truco del chef útil y concreto"
}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const recipe=JSON.parse(clean);

    // Assign a unique ID
    const allIds=getAllRecipes().map(r=>r.id);
    recipe.id=Math.max(...allIds,1000)+1;
    recipe.photo='';
    recipe.mercadona=recipe.ingredients.map(i=>i.n);

    pendingNewRecipe=recipe;

    result.innerHTML=`
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-top:0.75rem;">
        <div style="font-size:2rem;margin-bottom:0.4rem;">${recipe.emoji}</div>
        <div style="font-family:'Fraunces',serif;font-size:1rem;font-weight:700;">${recipe.name}</div>
        <div style="font-size:0.74rem;color:var(--text2);margin-top:0.15rem;">${recipe.desc}</div>
        <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem;">
          <span class="tag time">⏱ ${recipe.time}</span>
          <span class="tag kcal">🔥 ${recipe.kcal} kcal</span>
          <span class="tag cat">${recipe.cat}</span>
        </div>
        <div style="margin-top:0.75rem;font-size:0.75rem;color:var(--text2);">
          <strong style="color:var(--text);">Ingredientes:</strong> ${recipe.ingredients.map(i=>i.n).join(', ')}
        </div>
        <div style="margin-top:0.4rem;font-size:0.75rem;color:var(--text2);">
          <strong style="color:var(--text);">Pasos:</strong> ${recipe.steps.length} pasos · ${recipe.steps.map(s=>s.t).join(' → ')}
        </div>
      </div>`;
    saveBtn.style.display='block';
  } catch(e){
    result.innerHTML=`<div style="color:var(--red);font-size:0.8rem;padding:0.75rem;text-align:center;">❌ Error al generar. Comprueba la conexión e inténtalo de nuevo.</div>`;
  }

  btn.disabled=false; btn.textContent='✨ Generar receta';
}

function saveNewRecipe(){
  if(!pendingNewRecipe) return;
  customRecipes.push(pendingNewRecipe);
  saveCustomRecipes();
  document.getElementById('modal-create-recipe').classList.remove('open');
  pendingNewRecipe=null;
  renderBiblioteca();
  toast(`✅ "${customRecipes[customRecipes.length-1].name}" añadida a tu biblioteca`);
}

function deleteCustomRecipe(id){
  const r=R(id);
  if(!confirm(`¿Eliminar "${r.name}" de tu biblioteca?`)) return;
  customRecipes=customRecipes.filter(c=>c.id!==id);
  saveCustomRecipes();
  // Remove from menu if present
  weekMenu=weekMenu.map(mid=>mid===id?1:mid);
  saveMenu();
  renderBiblioteca();
  toast('🗑 Receta eliminada');
}
